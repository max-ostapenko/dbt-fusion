syntax = "proto3";

package com.fivetran.query_cache;

import "google/protobuf/duration.proto";
import "query_cache_protobuf/query_cache/struct.proto";

service ClientTelemetry {
    rpc RegisterSessionStart(SessionStartRequest) returns (SessionStartResponse) { option deprecated = true; };
    rpc SubmitTelemetryBatch(SubmitTelemetryBatchRequest) returns (SubmitTelemetryBatchResponse);
}

message SessionStartRequest {
    reserved 4;

    string dbt_run_cache_version = 1;
    string dbt_version = 2;
    string sqlglot_version = 3;
    Struct config = 5;
}

message SessionStartResponse {
    option deprecated = true;

    bool success = 1;
    string session_id = 2;
}

message SessionEndRequest {
    enum ClientResult {
        /* Session ended naturally */
        SUCCESS = 0; /* Client success - eg models ran without error */
        FAILURE = 1; /* Client failure - eg database error occurred */

        /* Session ended because the client deliberately hit cancel / ctrl+c */
        CANCELLED = 2;
    }

    /* How long the session lasted, as measured by the client itself */
    google.protobuf.Duration session_duration = 1;

    /* More information about why the session ended */
    ClientResult result = 2;
    string result_description = 3;

    /* Client-specific metrics.
       The key should be an identifier and the value should be structured data */
    Struct metrics = 4;
}

message ClientPrepareEnrichedSQLRequest {
    string request_id = 1;
    double duration = 2;
    optional string target_table_fqn = 3;
    optional int64 num_dependencies = 4;
    optional int64 num_view_dependencies = 5;
    optional string error_type = 6;
    optional int64 view_traversal_duration_ms = 7;
    optional int64 last_modified_duration_ms = 8;
    map<string, string> labels = 9;
}

message ClientTelemetryEvent {
    oneof request {
        ClientPrepareEnrichedSQLRequest enriched_sql_prepared = 1;
        SessionStartRequest session_start = 2;
        // note: this is only called SessionEndRequest to match SessionStartRequest
        // future event payloads should be called FooEvent, not FooRequest
        SessionEndRequest session_end = 4;
    }
    optional int64 event_order = 3;
}

message SubmitTelemetryBatchRequest {
    repeated ClientTelemetryEvent events = 1;
}

message SubmitTelemetryBatchResponse {
    bool success = 1;
}
