[graph]
exclude = ["dbt-fusion-workspace-hack"]
all-features = false
no-default-features = false

# Only check normal dependencies, not dev-dependencies
exclude-dev = true

[bans]
multiple-versions = "allow"
deny = [
  { crate = "dbt-features", reason = "dbt-compilation must not depend on dbt-features (inject individual feature component)" },
]
