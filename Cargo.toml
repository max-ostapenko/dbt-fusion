tokio-stream = "0.1.17"
tokio-util = { version = "0.7", features = ["io"] }

# atomic
arc-swap = { version = "1.7.1" }

# pretty
comfy-table = { version = "7.1.1" }
indicatif = { version = "0.18.4" }

# repl
rustyline = { version = "15.0.0", default-features = false, features = [
  "derive",
] }

# datatypes and algos
base64 = "0.22.1"
bigdecimal = "0.4.7"
bimap = "0.6.3"
bitflags = "2.9.4"
blake3 = "1.5.0"
bollard = "0.18.1"
chrono = { version = "0.4.41", features = ["std", "clock", "serde"] }
chrono-tz = { version = "0.10" }
clap = { version = "4.4.4", features = ["derive"] }
clap_complete = "4.5"
counter = "0.6.0"
dashmap = "6.1.0"
fancy-regex = "0.14.0"
fs2 = "0.4"
hex = { version = "0.4.3" }
humantime = "2.1.0"
iana-time-zone = { version = "0.1.62" }
im = "15.1.0"
indexmap = "2.2.3"
ini = "1.3.0"
itertools = "0.14.0"
libc = "0.2"
linked-hash-map = "0.5.6"
linked_hash_set = "0.1.4"
md5 = "0.7.0"
percent-encoding = "2.3.1"
petgraph = "0.8.1"
pkcs8 = { version = "0.10", features = ["pkcs5", "3des"] }
rand = "0.9.0"
regex = "1.11.1"
rsa = "0.9"
rust-lapper = "1.1.0"
scc = "3.1.2"
sha2 = "0.10.8"
similar = "2.6"
siphasher = { version = "1.0.1" }
url = "2.5.4"
ustr = "1.0.0"
zstd-safe = "7"

# testing
fake = { version = "4.4.0", features = ["derive", "uuid", "time"] }
goldie = "0.5.0"
indoc = "2.0.6"
merge = { version = "0.2.0" }
mockito = "1.2"
pretty_assertions = { version = "1.4.1" }
sqllogictest = "0.26.0"

# protobuf
bytes = "1.10.1"
pbjson = "0.8.0"
pbjson-build = "0.8.0"
pbjson-types = "0.8.0"
prost = "0.14"
prost-build = "0.14"
prost-types = "0.14"
pyo3 = { version = "0.27", features = ["extension-module"] }

# jsonschema
jsonschema-valid = "0.5.2"

# phf
phf = { version = "0.11" }
phf_shared = { version = "0.11" }

# error handling
anyhow = { version = "1.0.74" }
thiserror = "2"

# logging
env_logger = "0.10" # To be removed

# tracing (observability)
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "json"] }

# proc macro dependencies
prettyplease = "0.2"
proc-macro2 = "1"
quote = "1"
syn = { version = "2", features = ["full"] }

# gRPC dependencies
tonic = { version = "0.14.1", features = ["transport", "tls-native-roots"] }
tonic-build = "0.14.1"
tonic-prost = "0.14.1"
tonic-prost-build = "0.14.1"

# Security and cryptography dependencies
ed25519-dalek = { version = "2", features = ["pkcs8", "pem"] }
jsonwebtoken = { version = "9", features = ["use_pem"] }

# OpenTelemetry (optional embedded OTLP exporter for traces, see dbt-common)
opentelemetry = "0.30.0"
opentelemetry-otlp = "0.30.0"
opentelemetry-proto = "=0.30.0"
opentelemetry-semantic-conventions = "0.30.0"
opentelemetry_sdk = "0.30.0"

# tracing (local profiling)
# Compile with --features "tracy-client/enable" to enable integration with the
# Tracy profiler: https://github.com/wolfpld/tracy
rusqlite = { version = "0.38", features = ["bundled"] }
tracy-client = { version = "=0.18.0", default-features = false }
unicode-segmentation = "1.12"

# axum dependency
axum = "0.8.5"
tower-http = { version = "0.6", features = ["trace"] }

# system browser opener
open = "5"

# When updating these lints mind that some crates may not inherit form workspace
# Use only "warn" in this section if you want to deny a lint. CI run will turn these 
# into deny, and we don't want to disallow local compilation of "dirty" code.

[workspace.lints.clippy]
# TODO(serramatutu): We should enable "missing_lints_inheritance" when it lands in Rust stable.
# See: https://github.com/rust-lang/cargo/pull/16588
# missing_lints_inheritance = "warn"
dbg_macro = "warn"
cognitive_complexity = "warn"
used_underscore_binding = "warn"
redundant_clone = "warn"
inefficient_to_string = "warn"
or_fun_call = "warn"
unnecessary_lazy_evaluations = "warn"
collapsible_if = "allow"
too_many_arguments = "allow"

[workspace.lints.rust]
unused_qualifications = "warn"
#unused_crate_dependencies = "warn"
