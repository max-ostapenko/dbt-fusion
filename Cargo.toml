] }
datafusion-functions-aggregate = { version = "50.3.0" }
datafusion-functions-nested = { version = "50.3.0" }
datafusion-functions-window = { version = "50.3.0" }
datafusion-physical-expr = { version = "50.3.0" }
datafusion-physical-plan = { version = "50.3.0" }
datafusion-sql = { version = "50.3.0" }
